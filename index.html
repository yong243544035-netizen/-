<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Contact on WhatsApp</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:sans-serif;
  background:#ffffff;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div>
  <h2>Tap anywhere to chat on WhatsApp</h2>
</div>

<script>
// ===== 把你的所有号码放这里（国际格式，无+）=====
var phones = [
"27663323496",
"27711764389",
"27725974065",
"27727482857"
// 继续加
];

// 随机选一个号码
function getRandomPhone(){
  return phones[Math.floor(Math.random()*phones.length)];
}

// 点击屏幕任意位置触发
document.body.addEventListener("click", function(){
  var phone = getRandomPhone();

  // 先唤醒 App
  window.location.href = "whatsapp://send?phone=" + phone + "&text=Hi";

  // 兜底
  setTimeout(function(){
    window.location.href = "https://wa.me/" + phone + "?text=Hi";
  },1200);
});
</script>

</body>
</html>
